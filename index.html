<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Salary Calculator</title>
</head>

<body>

  <header>
    <h1>Salary Calculator</h1>
  </header> 

  <main>
    <div id="content">
    <h2>Add Employee</h2>
    <form class="salary-form" onSubmit="submitForm(event)">
      First Name: <input id="firstName" data-testid="firstNameInput" type="text" />
      <br />
      Last Name: <input id="lastName" data-testid="lastNameInput" type="text" />
      <br />
      ID #: <input id="idNum" data-testid="idInput" type="number" />
      <br />
      Job Title: <input id="position" data-testid="titleInput" type="text" />
      <br />
      Annual Salary: <input id="salary" data-testid="annualSalaryInput" type="number" />
      <br />

    <button data-testid="submitButton">Submit</button>

  </form>

    <table id="employees">
    <h2>Employees</h2>
     <!-- Table heading displays the descriptions -->
     <thead>
      <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>ID Number</th>
          <th>Job Title</th>
          <th>Annual Salary</th>
          <th>Action</th>
      </tr>
  </thead>
  <tbody id="peopleData">
      <tr>
          <td>Test</td>
          <td>Test</td>
          <td>1234567</td>
          <td>Unknown</td>
          <td>10,000</td>
          <td><button onClick="deleteRemove(event)" class="remove-button">Remove</button></td>
          
      
      </div></td>
      </tr>
    
      <!-- innerHTML -->
  </tbody>
</table>


  </main>

  <footer>
    <p>Total Monthly</p>
  </footer>
  <script src="client.js"></script>
</div>
</body>

</html>
